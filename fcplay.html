<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FanCode Player | Live</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <link rel="icon" href="https://fancode.com/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none; user-select: none;
        }
        :root { --nf: #E50914; --nfdk: #b0060f; }
        html, body {
            width: 100%; height: 100svh; overflow: hidden;
            background: #000; font-family: 'Inter', sans-serif;
            color: #fff; display: flex; flex-direction: column;
        }
        .hdr {
            flex-shrink: 0; padding: 10px 14px;
            background: rgba(3,3,8,0.97); backdrop-filter: blur(28px);
            border-bottom: 1px solid rgba(229,9,20,0.16);
        }
        .hdr-top {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 8px;
        }
        .back-a {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.8); padding: 6px 13px; border-radius: 6px;
            font-size: 0.78rem; font-weight: 600; text-decoration: none;
            transition: background 0.2s, border-color 0.2s;
        }
        .back-a:hover {
            background: rgba(229,9,20,0.14);
            border-color: rgba(229,9,20,0.35); color: #fff;
        }
        .hdr-right { display: flex; align-items: center; gap: 8px; }
        .share-b {
            display: inline-flex; align-items: center; gap: 6px;
            background: linear-gradient(135deg, #f59e0b, #eab308); color: #000;
            font-size: 0.78rem; font-weight: 700; padding: 6px 14px;
            border-radius: 6px; border: none; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 3px 10px rgba(234,179,8,0.3);
        }
        .share-b:hover { transform: translateY(-2px); box-shadow: 0 5px 16px rgba(234,179,8,0.5); }
        .live-pill {
            display: inline-flex; align-items: center; gap: 5px;
            background: var(--nf); color: #fff; font-size: 0.65rem;
            font-weight: 800; padding: 2.5px 8px; border-radius: 3px;
            text-transform: uppercase; letter-spacing: 0.06em;
        }
        .pre-pill {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(229,9,20,0.13); border: 1px solid rgba(229,9,20,0.35);
            color: #ff9090; font-size: 0.65rem; font-weight: 800;
            padding: 2px 8px; border-radius: 3px;
            text-transform: uppercase; letter-spacing: 0.06em;
        }
        .dot-a {
            width: 6px; height: 6px; border-radius: 50%;
            background: currentColor; flex-shrink: 0;
            animation: dp 1.4s ease-in-out infinite;
        }
        @keyframes dp { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .m-title {
            font-size: 1rem; font-weight: 900; color: #fff;
            line-height: 1.3; overflow: hidden; text-overflow: ellipsis;
            white-space: nowrap; max-width: calc(100vw - 28px);
        }
        .meta-row { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
        .tourn-t {
            font-size: 0.68rem; font-weight: 700; color: #f59e0b;
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        .lang-pill {
            display: inline-flex; align-items: center; gap: 5px;
            background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(236,72,153,0.2));
            border: 1px solid rgba(168,85,247,0.3); color: #e9d5ff;
            font-size: 0.68rem; font-weight: 600; padding: 2px 9px; border-radius: 20px;
        }
        .pw {
            flex-grow: 1; min-height: 0; position: relative;
            background: #000; overflow: hidden;
        }
        #vid { width: 100%; height: 100%; object-fit: contain; display: block; }
        .ls {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 25;
            transition: opacity 0.3s;
        }
        .ls.gone { opacity: 0; pointer-events: none; }
        .nf-ring {
            width: 46px; height: 46px;
            border: 3px solid rgba(229,9,20,0.18);
            border-top-color: var(--nf); border-radius: 50%;
            animation: nfr 0.75s linear infinite;
        }
        @keyframes nfr { to { transform: rotate(360deg); } }
        .ls-txt { margin-top: 13px; font-size: 0.76rem; color: rgba(255,255,255,0.38); }
        .top-grad {
            position: absolute; top: 0; left: 0; right: 0; height: 65px;
            background: linear-gradient(rgba(0,0,0,0.5), transparent);
            z-index: 5; pointer-events: none; transition: opacity 0.3s;
        }
        .top-grad.gone { opacity: 0; }
        .rw {
            position: absolute; inset: 0; display: flex;
            align-items: center; justify-content: center;
            z-index: 8; pointer-events: none; opacity: 0; transition: opacity 0.12s;
        }
        .rw.show { opacity: 1; }
        .rc {
            width: 62px; height: 62px; border-radius: 50%;
            background: rgba(0,0,0,0.62); border: 2px solid rgba(255,255,255,0.72);
            display: flex; align-items: center; justify-content: center;
            font-size: 25px; color: #fff; animation: rsc 0.38s ease-out both;
        }
        @keyframes rsc { from { transform: scale(0.65); } to { transform: scale(1.05); } }
        .ctrl {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.68) 28%, rgba(0,0,0,0.9) 100%);
            padding: 38px 14px 12px; z-index: 10;
            transition: opacity 0.3s, transform 0.3s;
        }
        .ctrl.gone { opacity: 0; transform: translateY(8px); pointer-events: none; }
        .prog {
            position: relative; height: 4px;
            background: rgba(255,255,255,0.22); border-radius: 2px;
            margin-bottom: 10px; cursor: pointer; transition: height 0.2s;
        }
        .prog:hover { height: 6px; }
        .buf-f {
            position: absolute; top: 0; left: 0; height: 100%;
            background: rgba(255,255,255,0.35); border-radius: 2px;
        }
        .play-f {
            position: absolute; top: 0; left: 0; height: 100%;
            background: var(--nf); border-radius: 2px; max-width: 100%;
        }
        .prog-dot {
            position: absolute; right: -6px; top: 50%;
            transform: translateY(-50%) scale(0); width: 13px; height: 13px;
            background: var(--nf); border-radius: 50%; transition: transform 0.15s;
        }
        .prog:hover .prog-dot { transform: translateY(-50%) scale(1); }
        .cr { display: flex; align-items: center; gap: 6px; }
        .cb {
            background: transparent; border: none; color: #fff; cursor: pointer;
            padding: 7px; border-radius: 4px; font-size: 15px;
            display: flex; align-items: center; justify-content: center;
            transition: color 0.15s, transform 0.12s; flex-shrink: 0;
        }
        .cb:hover { color: var(--nf); transform: scale(1.1); }
        .cb:active { transform: scale(0.93); }
        .cb.lg { font-size: 20px; }
        .vol-g { display: flex; align-items: center; gap: 4px; }
        .vol-slide { width: 0; overflow: hidden; transition: width 0.3s; }
        .vol-g:hover .vol-slide { width: 55px; }
        input.vr {
            -webkit-appearance: none; width: 55px; height: 3px;
            background: rgba(255,255,255,0.26); border-radius: 2px;
            outline: none; cursor: pointer;
        }
        input.vr::-webkit-slider-thumb {
            -webkit-appearance: none; width: 11px; height: 11px;
            border-radius: 50%; background: #fff; cursor: pointer;
        }
        .t-lbl { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.86); white-space: nowrap; }
        .sp { flex: 1; }
        .qual-p {
            position: absolute; bottom: 52px; right: 44px;
            background: rgba(6,6,6,0.97); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 5px; min-width: 88px; padding: 5px 0; z-index: 20;
            opacity: 0; pointer-events: none; transform: translateY(5px);
            transition: opacity 0.18s, transform 0.18s;
        }
        .qual-p.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .q-o {
            padding: 7px 14px; font-size: 12px; color: rgba(255,255,255,0.73);
            cursor: pointer; transition: background 0.12s;
        }
        .q-o:hover { background: rgba(229,9,20,0.18); color: #fff; }
        .q-o.on { color: var(--nf); font-weight: 700; }
        .ps-ov {
            position: absolute; inset: 0; background: rgba(0,0,0,0.87);
            backdrop-filter: blur(5px); display: flex;
            align-items: center; justify-content: center; z-index: 16;
        }
        .ps-card {
            background: linear-gradient(145deg, #111, #1a0808);
            border: 1px solid rgba(229,9,20,0.26); border-radius: 14px;
            padding: 24px 20px; max-width: 305px; width: 92%; text-align: center;
            box-shadow: 0 0 50px rgba(229,9,20,0.12);
        }
        .ps-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(229,9,20,0.13); border: 1px solid rgba(229,9,20,0.36);
            color: #ff9090; font-size: 0.67rem; font-weight: 800;
            padding: 3px 10px; border-radius: 20px;
            text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px;
        }
        .ps-title { font-size: 0.9rem; font-weight: 800; color: #fff; margin-bottom: 5px; line-height: 1.35; }
        .ps-sub { font-size: 0.7rem; color: rgba(255,255,255,0.36); margin-bottom: 16px; line-height: 1.55; }
        .src-b {
            display: flex; align-items: center; justify-content: center; gap: 9px;
            width: 100%; padding: 11px 14px; border-radius: 8px; font-size: 0.85rem;
            font-weight: 700; cursor: pointer; border: none;
            transition: transform 0.2s, box-shadow 0.2s; margin-top: 9px;
        }
        .src-fc {
            background: linear-gradient(135deg, var(--nf), var(--nfdk));
            color: #fff; box-shadow: 0 4px 14px rgba(229,9,20,0.36);
        }
        .src-fc:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(229,9,20,0.52); }
        .src-dai {
            background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.86);
            border: 1px solid rgba(255,255,255,0.15) !important;
        }
        .src-dai:hover { background: rgba(255,255,255,0.11); transform: translateY(-2px); }
        .ftr {
            flex-shrink: 0; background: rgba(3,3,8,0.97); backdrop-filter: blur(28px);
            border-top: 1px solid rgba(255,255,255,0.06); padding: 9px 14px; text-align: center;
        }
        .tg-b {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            background: linear-gradient(135deg, #0ea5e9, #06b6d4); color: #000;
            font-size: 0.82rem; font-weight: 700; padding: 10px 20px; border-radius: 8px;
            width: 100%; max-width: 400px; text-decoration: none;
            box-shadow: 0 3px 12px rgba(14,165,233,0.3); transition: transform 0.2s, box-shadow 0.2s;
        }
        .tg-b:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(14,165,233,0.5); }
        .pop-bg {
            position: fixed; inset: 0; background: rgba(0,0,0,0.78);
            backdrop-filter: blur(7px); z-index: 50; display: flex;
            align-items: center; justify-content: center;
            opacity: 0; visibility: hidden;
            transition: opacity 0.32s, visibility 0s 0.32s;
        }
        .pop-bg.on { opacity: 1; visibility: visible; transition: opacity 0.32s; }
        .pop-box {
            background: linear-gradient(145deg, #0e0e0e, #18182a);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
            width: 90%; max-width: 365px; padding: 26px; text-align: center;
            transform: scale(0.9) translateY(14px); opacity: 0;
            transition: transform 0.32s cubic-bezier(0.215,0.61,0.355,1), opacity 0.32s;
        }
        .pop-bg.on .pop-box { transform: scale(1) translateY(0); opacity: 1; }
        .pop-join {
            display: block; background: linear-gradient(135deg, #22d3ee, #0ea5e9);
            color: #fff; font-weight: 700; padding: 12px; border-radius: 8px;
            text-decoration: none; font-size: 0.88rem; margin-bottom: 9px;
            transition: transform 0.2s;
        }
        .pop-join:hover { transform: scale(1.04); }
        .pop-cl {
            width: 100%; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.58);
            font-weight: 600; padding: 12px; border-radius: 8px; cursor: pointer;
            font-size: 0.88rem; transition: background 0.2s;
        }
        .pop-cl:hover { background: rgba(255,255,255,0.1); }
        .err-p {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 2rem; text-align: center;
        }
        body.theater .hdr, body.theater .ftr { display: none; }
    </style>
</head>
<body>

    <header class="hdr" id="hdr">
        <div class="hdr-top">
            <a href="fancode.html" class="back-a"><i class="fas fa-arrow-left"></i> Back</a>
            <div class="hdr-right">
                <div id="status-slot"></div>
                <button class="share-b" id="share-b"><i class="fas fa-share-alt"></i> Share</button>
            </div>
        </div>
        <div class="m-title" id="m-title">Loading...</div>
        <div class="meta-row">
            <span class="tourn-t" id="tourn-t" style="display:none;"></span>
            <span class="lang-pill" id="lang-pill" style="display:none;">
                <i class="fas fa-globe" style="font-size:0.6rem;"></i>
                <span id="lang-t"></span>
            </span>
        </div>
    </header>

    <div class="pw" id="pw">
        <div class="ls" id="ls">
            <div class="nf-ring"></div>
            <p class="ls-txt">Loading stream...</p>
        </div>

        <video id="vid" playsinline></video>

        <div class="top-grad" id="tg-grad"></div>

        <div class="rw" id="rw">
            <div class="rc" id="rc"><i class="fas fa-play" style="margin-left:3px;"></i></div>
        </div>

        <div class="qual-p" id="qp"></div>

        <div class="ctrl" id="ctrl">
            <div class="prog" id="prog">
                <div class="buf-f" id="bf" style="width:0%"></div>
                <div class="play-f" id="pf" style="width:0%">
                    <div class="prog-dot"></div>
                </div>
            </div>
            <div class="cr">
                <button class="cb lg" id="ppb"><i class="fas fa-play"></i></button>
                <div class="vol-g">
                    <button class="cb" id="mb"><i class="fas fa-volume-up"></i></button>
                    <div class="vol-slide">
                        <input class="vr" type="range" id="vr" min="0" max="100" value="100">
                    </div>
                </div>
                <div class="t-lbl" id="tl">
                    <span class="live-pill"><span class="dot-a"></span>LIVE</span>
                </div>
                <div class="sp"></div>
                <button class="cb" id="qb" title="Quality"><i class="fas fa-cog"></i></button>
                <button class="cb" id="thb" title="Theater Mode"><i class="fas fa-expand"></i></button>
                <button class="cb lg" id="fsb" title="Fullscreen"><i class="fas fa-expand-arrows-alt"></i></button>
            </div>
        </div>
    </div>

    <footer class="ftr">
        <a href="https://t.me/+rpCDHZWrhWszM2Y1" target="_blank" class="tg-b">
            <i class="fab fa-telegram-plane" style="font-size:15px;"></i> Join Telegram Channel
        </a>
    </footer>

    <div class="pop-bg" id="pb">
        <div class="pop-box">
            <div style="font-size:46px;color:#0ea5e9;margin-bottom:10px;"><i class="fab fa-telegram"></i></div>
            <h3 style="font-size:1.1rem;font-weight:800;margin-bottom:6px;">Never Miss a Match!</h3>
            <p style="font-size:0.8rem;color:rgba(255,255,255,0.44);margin-bottom:20px;line-height:1.55;">Join our channel for live stream links and instant updates.</p>
            <a href="https://t.me/+rpCDHZWrhWszM2Y1" target="_blank" class="pop-join" id="pj">
                <i class="fas fa-rocket" style="margin-right:6px;"></i>Join Now
            </a>
            <button class="pop-cl" id="pc">Maybe Later</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const DATA_URL = 'https://raw.githubusercontent.com/doctor-8trange/zyphx8/refs/heads/main/data/fancode.json';

        const vid = document.getElementById('vid');
        const ls = document.getElementById('ls');
        const ctrl = document.getElementById('ctrl');
        const tgGrad = document.getElementById('tg-grad');
        const prog = document.getElementById('prog');
        const pf = document.getElementById('pf');
        const bf = document.getElementById('bf');
        const ppb = document.getElementById('ppb');
        const mb = document.getElementById('mb');
        const vr = document.getElementById('vr');
        const tl = document.getElementById('tl');
        const qb = document.getElementById('qb');
        const qp = document.getElementById('qp');
        const thb = document.getElementById('thb');
        const fsb = document.getElementById('fsb');
        const rw = document.getElementById('rw');
        const rc = document.getElementById('rc');
        const pw = document.getElementById('pw');

        let hideT = null;
        let hlsInst = null;
        let isLive = true;
        let matchData = null;

        const LANGS = {
            'BLOODY_SWEET': '🎯 Multi-Audio',
            'ENGLISH': '🇬🇧 English',
            'HINDI': '🇮🇳 Hindi',
            'TAMIL': '🇮🇳 Tamil',
            'TELUGU': '🇮🇳 Telugu',
            'KANNADA': '🇮🇳 Kannada',
            'BENGALI': '🇮🇳 Bengali',
            'MALAYALAM': '🇮🇳 Malayalam',
            'MARATHI': '🇮🇳 Marathi'
        };

        function fmtLang(l) {
            return LANGS[(l || '').toUpperCase()] || '🌐 ' + (l ? l.charAt(0) + l.slice(1).toLowerCase() : '');
        }

        function fmtTime(s) {
            if (!isFinite(s) || s < 0) return '00:00';
            return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(Math.floor(s % 60)).padStart(2, '0');
        }

        function resolveUrl(match, key) {
            const c = match.STREAMING_CDN;
            if (key === 'backup_fc') return c?.backup?.fancode_cdn;
            if (key === 'backup_dai') return c?.backup?.fancode_dai_cdn;
            return c?.[key];
        }

        function setHeader(match) {
            document.title = (match.title || 'Live') + ' | FanCode';
            document.getElementById('m-title').textContent = match.title || 'Live Match';
            if (match.tournament) {
                const t = document.getElementById('tourn-t');
                t.textContent = match.tournament;
                t.style.display = 'inline-block';
            }
            if (match.language) {
                document.getElementById('lang-t').textContent = fmtLang(match.language);
                document.getElementById('lang-pill').style.display = 'inline-flex';
            }
            const ss = document.getElementById('status-slot');
            const liveS = match.status?.toUpperCase() === 'LIVE';
            const strOn = match.streamingStatus?.toUpperCase() === 'STARTED';
            if (liveS && strOn) {
                ss.innerHTML = '<span class="live-pill"><span class="dot-a"></span>LIVE</span>';
            } else if (!liveS && strOn) {
                ss.innerHTML = '<span class="pre-pill"><span class="dot-a"></span>Pre-Match Live</span>';
            }
        }

        function buildPreStream(match) {
            const fc = match.STREAMING_CDN?.backup?.fancode_cdn;
            const dai = match.STREAMING_CDN?.backup?.fancode_dai_cdn;
            const el = document.createElement('div');
            el.className = 'ps-ov';
            el.id = 'psov';
            el.innerHTML = '<div class="ps-card">'
                + '<div class="ps-badge"><span class="dot-a"></span>Pre-Match Stream Active</div>'
                + '<div class="ps-title">' + (match.title || 'Match') + '</div>'
                + '<div class="ps-sub">Match has not officially started, but the stream feed is live.<br>Select your preferred source:</div>'
                + (fc ? '<button class="src-b src-fc" onclick="pickStream(\'' + fc + '\')"><i class="fas fa-bolt"></i> FanCode Live</button>' : '')
                + (dai ? '<button class="src-b src-dai" onclick="pickStream(\'' + dai + '\')"><i class="fas fa-tv"></i> ADMi Stream</button>' : '')
                + '</div>';
            pw.appendChild(el);
        }

        function pickStream(url) {
            const ov = document.getElementById('psov');
            if (ov) ov.remove();
            ls.classList.remove('gone');
            startHLS(url);
        }

        function startHLS(url) {
            if (hlsInst) { hlsInst.destroy(); hlsInst = null; }
            if (url.includes('.m3u8') && Hls.isSupported()) {
                const hls = new Hls({ startLevel: -1, maxBufferLength: 30 });
                hlsInst = hls;
                hls.loadSource(url);
                hls.attachMedia(vid);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    ls.classList.add('gone');
                    vid.play().catch(() => {});
                    buildQual(hls);
                });
                hls.on(Hls.Events.LEVEL_LOADED, (e, d) => {
                    isLive = d.details.live;
                    if (!isLive) { tl.textContent = '00:00 / 00:00'; pf.style.width = '0%'; }
                });
                hls.on(Hls.Events.ERROR, (e, d) => {
                    if (!d.fatal) return;
                    if (d.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
                    else if (d.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
                });
            } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
                vid.src = url;
                vid.addEventListener('loadedmetadata', () => {
                    ls.classList.add('gone');
                    vid.play().catch(() => {});
                }, { once: true });
            } else {
                vid.src = url;
                ls.classList.add('gone');
                vid.play().catch(() => {});
            }
        }

        function buildQual(hls) {
            if (!hls.levels || hls.levels.length < 2) { qb.style.display = 'none'; return; }
            let h = '<div class="q-o on" data-lv="-1">Auto</div>';
            hls.levels.forEach((lv, i) => {
                h += '<div class="q-o" data-lv="' + i + '">' + (lv.height ? lv.height + 'p' : 'Level ' + (i + 1)) + '</div>';
            });
            qp.innerHTML = h;
            qp.querySelectorAll('.q-o').forEach(o => {
                o.addEventListener('click', () => {
                    hls.currentLevel = parseInt(o.dataset.lv);
                    qp.querySelectorAll('.q-o').forEach(x => x.classList.remove('on'));
                    o.classList.add('on');
                    qp.classList.remove('open');
                });
            });
        }

        function syncPP() { ppb.querySelector('i').className = vid.paused ? 'fas fa-play' : 'fas fa-pause'; }

        function syncVol() {
            const i = mb.querySelector('i');
            if (vid.muted || vid.volume === 0) i.className = 'fas fa-volume-mute';
            else if (vid.volume < 0.5) i.className = 'fas fa-volume-down';
            else i.className = 'fas fa-volume-up';
        }

        function showCtrl() {
            ctrl.classList.remove('gone');
            tgGrad.classList.remove('gone');
            clearTimeout(hideT);
            hideT = setTimeout(() => {
                if (!vid.paused) { ctrl.classList.add('gone'); tgGrad.classList.add('gone'); }
            }, 3500);
        }

        function flashRipple(icon) {
            rc.innerHTML = '<i class="' + icon + '" style="margin-left:' + (icon.includes('pause') ? '0' : '3px') + ';"></i>';
            rw.classList.add('show');
            clearTimeout(rw._t);
            rw._t = setTimeout(() => rw.classList.remove('show'), 500);
        }

        pw.addEventListener('click', e => {
            if (e.target.closest('#ctrl') || e.target.closest('.qual-p') || e.target.closest('.ps-ov')) return;
            if (ctrl.classList.contains('gone')) { showCtrl(); return; }
            vid.paused ? vid.play() : vid.pause();
            flashRipple(vid.paused ? 'fas fa-pause' : 'fas fa-play');
        });

        pw.addEventListener('mousemove', showCtrl);
        pw.addEventListener('touchstart', showCtrl, { passive: true });

        ppb.addEventListener('click', e => { e.stopPropagation(); vid.paused ? vid.play() : vid.pause(); });
        mb.addEventListener('click', e => { e.stopPropagation(); vid.muted = !vid.muted; syncVol(); });

        vr.addEventListener('input', e => {
            e.stopPropagation();
            vid.volume = e.target.value / 100;
            vid.muted = +e.target.value === 0;
            syncVol();
        });

        vid.addEventListener('play', () => { syncPP(); showCtrl(); });
        vid.addEventListener('pause', () => { syncPP(); showCtrl(); });
        vid.addEventListener('volumechange', syncVol);

        vid.addEventListener('timeupdate', () => {
            if (!isLive && vid.duration) {
                pf.style.width = ((vid.currentTime / vid.duration) * 100) + '%';
                tl.textContent = fmtTime(vid.currentTime) + ' / ' + fmtTime(vid.duration);
            }
            if (vid.buffered.length > 0 && vid.duration) {
                bf.style.width = ((vid.buffered.end(vid.buffered.length - 1) / vid.duration) * 100) + '%';
            }
        });

        vid.addEventListener('waiting', () => ls.classList.remove('gone'));
        vid.addEventListener('playing', () => ls.classList.add('gone'));

        prog.addEventListener('click', e => {
            if (isLive || !vid.duration) return;
            const r = prog.getBoundingClientRect();
            vid.currentTime = ((e.clientX - r.left) / r.width) * vid.duration;
        });

        qb.addEventListener('click', e => { e.stopPropagation(); qp.classList.toggle('open'); });

        document.addEventListener('click', e => {
            if (!qp.contains(e.target) && !qb.contains(e.target)) qp.classList.remove('open');
        });

        thb.addEventListener('click', e => {
            e.stopPropagation();
            document.body.classList.toggle('theater');
            thb.querySelector('i').className = document.body.classList.contains('theater') ? 'fas fa-compress' : 'fas fa-expand';
        });

        fsb.addEventListener('click', e => {
            e.stopPropagation();
            if (!document.fullscreenElement) {
                (pw.requestFullscreen || pw.webkitRequestFullscreen).call(pw);
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen).call(document);
            }
        });

        document.addEventListener('fullscreenchange', () => {
            fsb.querySelector('i').className = document.fullscreenElement ? 'fas fa-compress-arrows-alt' : 'fas fa-expand-arrows-alt';
        });

        document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT') return;
            switch (e.key.toLowerCase()) {
                case ' ': case 'k': e.preventDefault(); vid.paused ? vid.play() : vid.pause(); break;
                case 'f': (pw.requestFullscreen || pw.webkitRequestFullscreen)?.call(pw); break;
                case 't': document.body.classList.toggle('theater'); break;
                case 'm': vid.muted = !vid.muted; break;
                case 'arrowup': vid.volume = Math.min(1, vid.volume + 0.1); break;
                case 'arrowdown': vid.volume = Math.max(0, vid.volume - 0.1); break;
            }
        });

        document.getElementById('share-b').addEventListener('click', async () => {
            try {
                const d = { title: (matchData?.title || 'FanCode Live'), url: location.href };
                if (navigator.share) await navigator.share(d);
                else { await navigator.clipboard.writeText(location.href); alert('Link copied!'); }
            } catch (x) {}
        });

        function initPopup() {
            const pb = document.getElementById('pb');
            pb.classList.add('on');
            document.getElementById('pc').addEventListener('click', () => pb.classList.remove('on'));
            document.getElementById('pj').addEventListener('click', () => setTimeout(() => pb.classList.remove('on'), 280));
        }

        function showErr(msg) {
            document.body.innerHTML = '<div class="err-p">'
                + '<div style="font-size:2.5rem;margin-bottom:14px;">⚠️</div>'
                + '<h2 style="font-size:1.25rem;font-weight:800;color:#E50914;margin-bottom:8px;">Stream Error</h2>'
                + '<p style="color:rgba(255,255,255,0.46);font-size:0.85rem;max-width:270px;line-height:1.6;">' + msg + '</p>'
                + '<a href="fancode.html" style="margin-top:22px;background:#E50914;color:#fff;padding:10px 24px;border-radius:7px;font-weight:700;font-size:0.88rem;text-decoration:none;">← Go Back</a>'
                + '</div>';
        }

        async function boot() {
            const p = new URLSearchParams(location.search);
            const id = p.get('id');
            const cdn = p.get('cdn');
            if (!id) { showErr('Missing match ID. Please go back and select a match.'); return; }
            try {
                const res = await fetch(DATA_URL);
                if (!res.ok) throw new Error('Failed to fetch data');
                const data = await res.json();
                const match = data.matches?.find(m => String(m.match_id) === String(id));
                if (!match) throw new Error('Match not found');
                matchData = match;
                setHeader(match);
                const liveS = match.status?.toUpperCase() === 'LIVE';
                const strOn = match.streamingStatus?.toUpperCase() === 'STARTED';
                if (!liveS && strOn) {
                    ls.classList.add('gone');
                    buildPreStream(match);
                } else {
                    const url = cdn ? resolveUrl(match, cdn) : match.STREAMING_CDN?.fancode_cdn;
                    if (!url || url === 'Unavailable') throw new Error('Stream unavailable for this match.');
                    startHLS(url);
                }
            } catch (e) {
                showErr(e.message || 'Could not load stream.');
            }
            initPopup();
        }

        boot();
    </script>
</body>
</html>
