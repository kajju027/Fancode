<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="referrer" content="no-referrer">

    <title>CRICKET STREAMING POINT | Live Stream</title>
    <meta name="description" content="Stream live sports in HD.">
    <meta name="robots" content="noindex, nofollow">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        heading: ['"Space Grotesk"', 'sans-serif'],
                        body: ['"Inter"', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css"/>

    <style>
        body { background: #09090b; }

        .bg-mesh {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 500px 400px at 20% 10%, rgba(16,185,129,0.03) 0%, transparent 100%),
                radial-gradient(ellipse 400px 400px at 80% 90%, rgba(239,68,68,0.02) 0%, transparent 100%);
        }

        @keyframes livePulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16,185,129,0.5); }
            50%      { opacity: 0.5; box-shadow: 0 0 0 3px rgba(16,185,129,0); }
        }
        .live-dot { animation: livePulse 1.5s ease-in-out infinite; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.4s ease-out both; }
        .fade-up-d1 { animation-delay: 0.06s; }
        .fade-up-d2 { animation-delay: 0.12s; }
        .fade-up-d3 { animation-delay: 0.18s; }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.92) translateY(8px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes spin { to { transform: rotate(360deg); } }

        .plyr { width: 100%; height: 100%; }
        .plyr__video-wrapper { background: #000; }
        .plyr--fullscreen-active {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 99999;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
    </style>
</head>

<body class="font-body text-zinc-300 min-h-screen flex flex-col relative">

    <div class="bg-mesh"></div>

    <!-- ══════════ PLAYER SCREEN ══════════ -->
    <div class="hidden" id="videoScreen">

        <!-- Top Bar -->
        <div class="sticky top-0 z-50 border-b border-zinc-800/30 bg-zinc-950/90 backdrop-blur-xl">
            <div class="max-w-[900px] mx-auto px-4 py-3 flex items-center justify-between gap-3">
                <div class="flex items-center gap-3 min-w-0">
                    <a href="../" class="flex-shrink-0 w-8 h-8 rounded-lg bg-zinc-800/60 hover:bg-zinc-800 border border-zinc-800/40 flex items-center justify-center transition-colors duration-200">

                    </a>
                    <div class="min-w-0">
                        <div id="headerTitle" class="font-heading font-semibold text-[13px] text-zinc-200 truncate leading-none">Loading...</div>
                    </div>

                <div id="headerBadge" class="flex items-center gap-[6px] px-2.5 py-[5px] rounded-lg bg-emerald-500/10 border border-emerald-500/15 text-[9px] font-bold uppercase tracking-[0.1em] text-emerald-400 flex-shrink-0">
                    <span class="w-[6px] h-[6px] rounded-full bg-emerald-400 live-dot"></span>
                    LIVE

            </div>
        </div>

        <!-- Content -->
        <div class="relative z-10 flex-1 max-w-[900px] w-full mx-auto px-4 pt-4 pb-8 flex flex-col gap-3">

            <!-- Video -->
            <div class="fade-up relative w-full bg-black rounded-2xl overflow-hidden border border-zinc-800/30">
                <div class="absolute top-3 right-3 z-50 text-right pointer-events-none">
                    <div id="viewChannelName" class="text-[9px] font-semibold text-white/60">Fancode Official ™</div>
                    <div id="viewCount" class="text-[10px] font-bold text-white/80">0 Views</div>
                </div>
                <div class="relative w-full aspect-video bg-black" id="videoContainer">
                    <video id="player" controls playsinline crossorigin></video>
                    <div class="absolute inset-0 bg-black/92 flex flex-col items-center justify-center gap-3 z-[60]" id="loader">
                        <div class="w-10 h-10 border-2 border-zinc-800 border-t-zinc-500 rounded-full" style="animation:spin 0.7s linear infinite;"></div>

                </div>
                <div class="w-px h-3 bg-zinc-800/50 hidden sm:block"></div>
                <div class="flex items-center gap-2 text-[11px] text-zinc-500">
                    <svg class="w-3.5 h-3.5 text-zinc-600" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg>

                    Join WhatsApp Channel

            <!-- Action: Share -->
            <div class="fade-up fade-up-d3 bg-zinc-900/40 rounded-xl border border-zinc-800/25 p-4 flex flex-col gap-3">
                <div class="flex items-center gap-2 text-[12px] text-zinc-500 font-medium">
                    <svg class="w-4 h-4 text-zinc-600" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                    Copy Link & Share
                </div>
                <button id="btnShare" class="flex items-center justify-center gap-2 w-full py-3 rounded-xl bg-zinc-800/40 hover:bg-zinc-800/70 text-zinc-400 hover:text-zinc-300 border border-zinc-800/35 hover:border-zinc-700/40 text-[11px] font-bold uppercase tracking-[0.06em] transition-all duration-300 hover:-translate-y-0.5 cursor-pointer">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                    Copy Page Link
                </button>
            </div>

        </div>
    </div>

    <!-- ══════════ POPUP ══════════ -->

    <script src="player.js"></script>

</body>
