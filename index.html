<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FanCode Live — Match Board</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Momo+Trust+Display&family=Acme&family=Amaranth:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#02060c;
  --card:#0d1117;
  --card-2:#141b24;
  --border:#1f2733;
  --muted:#8b949e;
  --text:#f0f6fc;
  --gold:#ffd700;
  --accent-live:#198754;
  --accent-live-shadow:rgba(25,135,84,0.4);
  --accent-upcoming:#dc3545;
  --accent-upcoming-dark:#a31a25;
  --accent-upcoming-shadow:rgba(220,53,69,0.4);
}

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; }
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Momo Trust Display', 'Segoe UI', Arial, sans-serif;
  -webkit-font-smoothing:antialiased;
}
*{ user-select:none; }
button, input{ font-family:inherit; }
img{ -webkit-user-drag:none; }
a{ color:inherit; text-decoration:none; }

.app{ max-width:1360px; margin:0 auto; padding:0 20px 60px; }

header{
  position:sticky; top:0; z-index:40;
  display:flex; align-items:center; justify-content:space-between;
  gap:16px; flex-wrap:wrap;
  padding:16px 4px;
  background:rgba(2,6,12,0.88);
  -webkit-backdrop-filter:blur(10px);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  margin-bottom:26px;
}
.brand{ display:flex; flex-direction:column; gap:4px; }
.title{
  font-size:23px;
  font-weight:900;
  color:#ff4b4b;
  letter-spacing:1px;
  line-height:1;
}
.last-update{
  font-size:11.5px;
  color:var(--muted);
  letter-spacing:.4px;
}
.join-btn{
  appearance:none; border:none; cursor:pointer;
  display:flex; align-items:center; gap:8px;
  background:#0d6efd;
  color:#fff;
  font-weight:700;
  font-size:13px;
  letter-spacing:.5px;
  padding:11px 18px;
  border-radius:10px;
  box-shadow:0 4px 15px rgba(13,110,253,.35);
  transition:filter .2s ease, transform .15s ease;
}
.join-btn:hover{ filter:brightness(1.1); }
.join-btn:active{ transform:scale(.96); }

.controls{
  display:flex; justify-content:flex-end;
  margin-bottom:22px;
}
.search-wrap{
  position:relative;
  width:100%; max-width:340px;
}
.search-wrap svg{
  position:absolute; left:13px; top:50%; transform:translateY(-50%);
  opacity:.5; pointer-events:none;
}
.search-wrap input{
  width:100%;
  background:var(--card);
  border:1px solid var(--border);
  color:var(--text);
  font-size:13px;
  letter-spacing:.3px;
  padding:11px 14px 11px 38px;
  border-radius:10px;
  outline:none;
  transition:border-color .2s ease;
}
.search-wrap input::placeholder{ color:var(--muted); }
.search-wrap input:focus{ border-color:rgba(120,180,255,.55); }

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
  gap:25px;
}

.loading-state, .empty-state{
  grid-column:1/-1;
  text-align:center;
  padding:60px 20px;
  color:var(--muted);
  font-size:13.5px;
  letter-spacing:.5px;
  border:1px dashed var(--border);
  border-radius:14px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 10px 26px -14px rgba(0,0,0,.7);
  transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  display:flex; flex-direction:column;
}
.card:hover{
  transform:translateY(-3px);
  border-color:rgba(120,180,255,.32);
  box-shadow:0 18px 34px -16px rgba(0,0,0,.8);
}

.thumb-wrap{
  position:relative;
  width:100%;
  height:180px;
  background:#000;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
.thumb-wrap img{
  width:100%; height:100%;
  object-fit:contain;
  display:block;
}
.lang-badge{
  position:absolute; top:10px; left:10px;
  display:flex; align-items:center; gap:5px;
  background:rgba(0,0,0,.72);
  border:1px solid var(--gold);
  color:var(--gold);
  font-size:10.5px;
  font-weight:700;
  letter-spacing:.6px;
  padding:5px 10px;
  border-radius:20px;
}
.lang-badge svg{ flex:none; }

.meta{
  padding:16px 18px 18px;
  display:flex; flex-direction:column; gap:9px;
  flex:1;
  text-align:center;
}
.teams{
  font-size:17px;
  font-weight:800;
  letter-spacing:.3px;
  text-transform:uppercase;
  line-height:1.28;
}
.event{
  font-size:13px;
  color:var(--muted);
  letter-spacing:.2px;
}

.status-badge{
  position:absolute; top:10px; right:10px;
  display:flex; align-items:center; gap:5px;
  background:rgba(0,0,0,.55);
  font-size:9.5px;
  font-weight:700;
  letter-spacing:.6px;
  padding:4px 9px;
  border-radius:20px;
  opacity:.9;
}
.status-badge.live{ color:#7fd9a0; border:1px solid rgba(25,135,84,.4); }
.status-badge.upcoming{ color:#e8a0a5; border:1px solid rgba(163,26,37,.4); }
.status-badge.completed{ color:#c8ccd1; border:1px solid rgba(248,249,250,.2); }
.status-dot-mini{ width:5px; height:5px; border-radius:50%; background:currentColor; flex:none; }
.status-badge.live .status-dot-mini{ animation:miniPulse 1.8s infinite; }
@keyframes miniPulse{
  0%,100%{ opacity:1; }
  50%{ opacity:.4; }
}

.card-time{
  font-size:11px;
  color:var(--muted);
  letter-spacing:.3px;
}

.actions{ margin-top:auto; display:flex; flex-direction:column; gap:9px; padding-top:4px; }

.btn{
  appearance:none; border:none; cursor:pointer;
  width:100%;
  font-weight:800;
  font-size:13.5px;
  letter-spacing:.6px;
  padding:12px 14px;
  border-radius:10px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:filter .2s ease, transform .15s ease;
}
.btn:active{ transform:scale(.97); }
.btn-watch-now{
  background:var(--accent-live);
  color:#fff;
  box-shadow:0 4px 15px var(--accent-live-shadow);
}
.btn-watch-now:hover{ filter:brightness(1.1); }
.btn-watch-now.is-disabled{
  background:#2a2f38; color:var(--muted); box-shadow:none; cursor:not-allowed;
}
.btn-upcoming{
  background:var(--accent-upcoming);
  color:#fff;
  box-shadow:0 4px 15px var(--accent-upcoming-shadow);
}
.btn-upcoming:hover{ filter:brightness(1.1); }
.btn-completed{
  background:#f8f9fa;
  color:#000;
  box-shadow:0 4px 15px rgba(248,249,250,.2);
}

.btn-ww{
  background:rgba(120,180,255,.06);
  color:#9cc7ff;
  border:1px solid rgba(120,180,255,.3);
}
.btn-ww:hover{ background:rgba(120,180,255,.13); }
.btn-ww .chev{ margin-left:auto; transition:transform .3s ease; }
.btn-ww.open{ background:rgba(120,180,255,.13); }
.btn-ww.open .chev{ transform:rotate(180deg); }

.ww-panel-wrap{
  display:grid;
  grid-template-rows:0fr;
  opacity:0;
  transition:grid-template-rows .38s cubic-bezier(.4,0,.2,1), opacity .3s ease;
}
.ww-panel-wrap.open{ grid-template-rows:1fr; opacity:1; margin-top:1px; }
.ww-panel-inner{ overflow:hidden; display:flex; flex-direction:column; gap:7px; }
.ww-row{
  display:flex; align-items:center; gap:10px;
  padding:10px 12px;
  background:var(--card-2);
  border:1px solid var(--border);
  border-radius:9px;
  cursor:pointer;
  transition:background .2s ease, border-color .2s ease, transform .15s ease;
}
.ww-row:hover{
  background:rgba(120,180,255,.08);
  border-color:rgba(120,180,255,.32);
  transform:translateX(2px);
}
.ww-flag{ font-size:16px; line-height:1; flex:none; }
.ww-name{ font-size:12px; font-weight:700; flex:1; text-align:left; letter-spacing:.2px; }
.ww-code{ font-size:10px; font-weight:700; letter-spacing:.5px; color:var(--muted); }
.ww-row:hover .ww-code{ color:#9cc7ff; }

footer{
  margin-top:50px;
  padding-top:26px;
  border-top:1px solid var(--border);
  display:flex; flex-direction:column; align-items:center; gap:10px;
  text-align:center;
}
footer .note{
  font-size:11.5px;
  letter-spacing:1px;
  color:var(--muted);
  font-weight:700;
}
.visitor-counter-box{
  display:flex; align-items:center; gap:12px;
  padding:9px 18px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
}
.vc-item{ display:flex; flex-direction:column; align-items:center; gap:2px; }
.vc-value{
  font-size:15px; font-weight:800; color:var(--text);
  letter-spacing:.5px; font-variant-numeric:tabular-nums;
  font-family:'Segoe UI', Arial, sans-serif;
}
.vc-label{ font-size:8.5px; letter-spacing:.8px; color:var(--muted); text-transform:uppercase; }
.vc-sep{ width:1px; height:22px; background:var(--border); }

.popup-overlay{
  position:fixed; inset:0;
  background:rgba(0,0,0,.86);
  -webkit-backdrop-filter:blur(14px);
  backdrop-filter:blur(14px);
  display:flex; align-items:center; justify-content:center;
  padding:20px;
  z-index:99999;
}
.popup-overlay.hidden{ display:none; }
.popup-wrap{
  position:relative;
  width:100%; max-width:358px;
  padding:2px;
  background:linear-gradient(145deg, rgba(255,204,0,.8) 0%, rgba(255,224,80,.4) 50%, rgba(255,204,0,.8) 100%);
  border-radius:18px;
  box-shadow:0 0 50px rgba(255,204,0,.14), 0 30px 70px rgba(0,0,0,.72);
  animation:popIn .42s cubic-bezier(.175,.885,.32,1.275) both;
}
@keyframes popIn{
  from{ opacity:0; transform:scale(.87) translateY(24px); }
  to{ opacity:1; transform:scale(1) translateY(0); }
}
.popup-box{
  background:linear-gradient(168deg, #1e1e26 0%, #0e0e13 100%);
  border-radius:16px;
  padding:34px 24px 26px;
  text-align:center;
}
.popup-title{
  color:#ffcc00;
  font-family:'Acme', sans-serif;
  font-size:30px;
  letter-spacing:.5px;
  margin-bottom:12px;
}
.popup-text{
  color:#a0a0a8;
  font-size:14px;
  line-height:1.65;
  margin-bottom:24px;
  font-family:'Segoe UI', Arial, sans-serif;
}
.popup-text b{
  color:#fff;
  font-family:'Amaranth', sans-serif;
  font-size:17px;
  display:block;
  margin-top:7px;
}
.btn-popup{
  width:100%; padding:14px; border:none;
  border-radius:13px;
  font-family:'Amaranth', sans-serif;
  cursor:pointer;
  transition:transform .18s, box-shadow .18s;
  appearance:none;
  touch-action:manipulation;
  text-decoration:none;
  display:block;
}
.btn-popup:active{ transform:scale(.95); }
.btn-join-main{
  background:linear-gradient(90deg, #1bcc26, #17b823);
  color:#fff;
  font-size:18px; font-weight:700;
  letter-spacing:.6px;
  box-shadow:0 5px 20px rgba(23,184,35,.32);
  margin-bottom:9px;
  line-height:1;
  text-align:center;
}
.btn-join-main:hover{ box-shadow:0 8px 26px rgba(23,184,35,.42); }
.btn-joined-main{
  background:transparent;
  color:#484850;
  font-size:12px; font-weight:400;
  width:auto; margin:0 auto;
  padding:7px 14px;
  text-align:center;
}

button:focus-visible, .ww-row:focus-visible, input:focus-visible{
  outline:2px solid #6cb2ff;
  outline-offset:2px;
}

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
}

@media (max-width:450px){
  .title{ font-size:19px; }
  .join-btn{ padding:9px 14px; font-size:12px; }
  .controls{ justify-content:stretch; }
  .search-wrap{ max-width:100%; }
}

</style>
</head>

<body>

<div class="app">

  <header>
    <div class="brand">
      <div class="title">FANCODE LIVE</div>
      <div class="last-update" id="lastUpdate">LAST UPDATE: LOADING...</div>
    </div>
    <button type="button" class="join-btn" id="joinTelegramBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M21.5 4.5L2.7 11.9c-1.2.5-1.2 1.2-.2 1.5l4.8 1.5 1.8 5.6c.2.6.4.8.9.8.4 0 .6-.2.9-.5l2.2-2.1 4.6 3.4c.8.5 1.4.2 1.6-.8l3-14c.3-1.3-.5-1.9-1.8-1.8z"/></svg>
      JOIN TELEGRAM
    </button>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="SEARCH TEAM OR EVENT...">
    </div>
  </div>

  <div id="matchesGrid" class="grid">
    <div class="loading-state">LOADING MATCHES...</div>
  </div>

  <footer>
    <div class="note">SAYAN OAI | ALL RIGHTS RESERVED</div>
    <div class="visitor-counter-box" id="visitorCounter">
      <div class="vc-item"><span class="vc-value" id="vcTotal">—</span><span class="vc-label">Visits</span></div>
      <div class="vc-sep"></div>
      <div class="vc-item"><span class="vc-value" id="vcUnique">—</span><span class="vc-label">Unique</span></div>
    </div>
  </footer>

</div>

<div class="popup-overlay hidden" id="telegramModal">
  <div class="popup-wrap">
    <div class="popup-box">
      <div class="popup-title">Follow Us !!</div>
      <div class="popup-text">
        Join our Telegram channel<br>
        <b>FANCODE LIVE</b>
        For instant match links and live updates.
      </div>
      <a class="btn-popup btn-join-main" id="joinButton" target="_blank" rel="noopener noreferrer" href="https://t.me/+JSkwy86_04M2Zjdl">JOIN NOW</a>
      <button class="btn-popup btn-joined-main" id="closeButton" type="button">Already Joined</button>
    </div>
  </div>
</div>

<script>
const CNPTV_SOURCE = 'https://raw.githubusercontent.com/kajju027/Fancode-Events-Json/main/fan.json';
const WORLD_SOURCE  = 'https://raw.githubusercontent.com/kajju027/Fancode-Events-Json/main/fancode.json';
const PLAYER_PAGE   = 'fcplayer.html';
const TELEGRAM_LINK = 'https://t.me/+JSkwy86_04M2Zjdl';
const FALLBACK_IMG  = 'https://www.fancode.com/skillup-uploads/cms-media/Cricket_Fallback_Old_match-card.jpg';
const HIT_COUNTER_URL = 'https://sayan-prime.pages.dev/api/hit?key=Fancode';
const REFRESH_INTERVAL_MS = 60000;

const LANG_CODE_MAP = {
  ENGLISH:'eng', HINDI:'hin', BANGLA:'ban', BENGALI:'ban', TAMIL:'tam',
  TELUGU:'tel', KANNADA:'kan', MARATHI:'mar', MALAYALAM:'mal', PUNJABI:'pan',
  GUJARATI:'guj', URDU:'urd', ODIA:'ori', ASSAMESE:'asm', BHOJPURI:'bho'
};

const ICON_GLOBE = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.4 2.7 3.8 6 3.8 9s-1.4 6.3-3.8 9c-2.4-2.7-3.8-6-3.8-9s1.4-6.3 3.8-9z"/></svg>';
const ICON_WW    = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.4 2.7 3.8 6 3.8 9s-1.4 6.3-3.8 9c-2.4-2.7-3.8-6-3.8-9s1.4-6.3 3.8-9z"/></svg>';
const ICON_CHEV  = '<svg class="chev" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg>';

const grid       = document.getElementById('matchesGrid');
const lastUpdateEl = document.getElementById('lastUpdate');
const searchInput  = document.getElementById('searchInput');

let allMatches = [];
let lastUpdatedAt = null;
let lastWorldSnapshot = null;
let openPanels = new Set();

function esc(str){
  return String(str == null ? '' : str).replace(/[&<>"']/g, s => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[s]));
}

function langToCode(rawLang, isLive){
  let lang = String(rawLang || '').trim().toUpperCase();
  if(!lang || lang === 'BLOODY_SWEET'){
    if(isLive){ lang = 'ENGLISH'; } else { return null; }
  }
  if(LANG_CODE_MAP[lang]) return LANG_CODE_MAP[lang];
  const short = lang.slice(0,3).toLowerCase();
  return short || 'eng';
}

function langLabel(rawLang){
  const lang = String(rawLang || '').trim().toUpperCase();
  if(!lang) return null;
  if(lang === 'BLOODY_SWEET') return 'MULTI';
  return lang;
}

function parseMatchTime(str){
  if(!str) return null;
  const months = {january:0,february:1,march:2,april:3,may:4,june:5,july:6,
                   august:7,september:8,october:9,november:10,december:11};
  const m = String(str).match(/(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})\s+(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
  if(!m){ const d = new Date(str); return isNaN(d) ? null : d; }
  let [, day, monthName, year, hour, min, ampm] = m;
  const month = months[monthName.toLowerCase()];
  if(month === undefined){ const d = new Date(str); return isNaN(d) ? null : d; }
  day = +day; year = +year; hour = +hour; min = +min;
  if(ampm){
    ampm = ampm.toUpperCase();
    if(ampm === 'PM' && hour < 12) hour += 12;
    if(ampm === 'AM' && hour === 12) hour = 0;
  }
  return new Date(year, month, day, hour, min);
}

function parseUpdatedAt(str){
  if(!str) return null;
  const m = String(str).match(/(\d{1,2})\/(\d{1,2})\/(\d{4}),?\s*(\d{1,2}):(\d{2}):(\d{2})\s*(am|pm)/i);
  if(!m){ const d = new Date(str); return isNaN(d) ? null : d; }
  let day = +m[1], month = +m[2], year = +m[3], hour = +m[4], min = +m[5], sec = +m[6];
  const ampm = m[7].toLowerCase();
  if(ampm === 'pm' && hour < 12) hour += 12;
  if(ampm === 'am' && hour === 12) hour = 0;
  return new Date(year, month - 1, day, hour, min, sec);
}

function formatMatchTime(date){
  if(!date) return 'TIME TBA';
  const datePart = date.toLocaleDateString('en-IN', { day:'2-digit', month:'short' }).toUpperCase();
  let h = date.getHours();
  const mm = String(date.getMinutes()).padStart(2, '0');
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12; if(h === 0) h = 12;
  return `${datePart}, ${h}:${mm} ${ap}`;
}

function formatAbsoluteIST(date){
  if(!date) return 'UNAVAILABLE';
  const datePart = date.toLocaleDateString('en-IN', { day:'2-digit', month:'short' }).toUpperCase();
  let h = date.getHours();
  const mm = String(date.getMinutes()).padStart(2, '0');
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12; if(h === 0) h = 12;
  return `${datePart}, ${h}:${mm} ${ap} IST`;
}

function buildPlayerUrl(id, langCode, streamIndex){
  return `${PLAYER_PAGE}?id=${id}_${langCode}&s=${streamIndex}`;
}

function renderCard(m){
  const langTag = m.status === 'LIVE' ? langLabel(m.language) : null;
  const timeLabel = formatMatchTime(m.time);

  let statusHtml = '';
  let actionsHtml = '';

  if(m.status === 'LIVE'){
    statusHtml = `<span class="status-badge live"><span class="status-dot-mini"></span>LIVE</span>`;

    const canWatch = m.cnptvUrl && m.langCode;
    const watchAttrs = canWatch
      ? `data-url="${esc(buildPlayerUrl(m.id, m.langCode, 0))}"`
      : 'disabled';

    const wwOptions = [
      { key:'lk', flag:'🇱🇰', name:'Only Sri Lanka User',  url:m.lk, idx:1 },
      { key:'np', flag:'🇳🇵', name:'Only Nepal User',      url:m.np, idx:2 },
      { key:'bd', flag:'🇧🇩', name:'Only Bangladesh User', url:m.bd, idx:3 }
    ].filter(o => o.url);
    const hasAnyWW = m.langCode && wwOptions.length > 0;
    const isOpen = openPanels.has(String(m.id));

    actionsHtml = `
      <button type="button" class="btn btn-watch-now ${canWatch ? '' : 'is-disabled'}" ${watchAttrs}>WATCH NOW</button>
      ${hasAnyWW ? `
      <button type="button" class="btn btn-ww ${isOpen ? 'open' : ''}" data-target="ww-${m.id}">
        ${ICON_WW} WORLD WIDE STREAM ${ICON_CHEV}
      </button>
      <div class="ww-panel-wrap ${isOpen ? 'open' : ''}" id="ww-${m.id}">
        <div class="ww-panel-inner">
          ${wwOptions.map(o => `
            <div class="ww-row" tabindex="0" data-url="${esc(buildPlayerUrl(m.id, m.langCode, o.idx))}">
              <span class="ww-flag">${o.flag}</span>
              <span class="ww-name">${o.name}</span>
              <span class="ww-code">${o.key.toUpperCase()}</span>
            </div>`).join('')}
        </div>
      </div>` : ''}
    `;
  } else if(m.status === 'COMPLETED'){
    statusHtml = `<span class="status-badge completed"><span class="status-dot-mini"></span>COMPLETED</span>`;
    actionsHtml = `<a class="btn btn-completed" href="${TELEGRAM_LINK}" target="_blank" rel="noopener noreferrer">THANK YOU</a>`;
  } else {
    statusHtml = `<span class="status-badge upcoming"><span class="status-dot-mini"></span>UPCOMING</span>`;
    actionsHtml = `<button type="button" class="btn btn-upcoming" data-upcoming-time="${esc(timeLabel)}">UPCOMING</button>`;
  }

  return `
    <article class="card" data-match-id="${esc(m.id)}">
      <div class="thumb-wrap">
        <img src="${esc(m.image)}" alt="${esc(m.title)}" loading="lazy" onerror="this.onerror=null;this.src='${FALLBACK_IMG}'">
        ${langTag ? `<span class="lang-badge">${ICON_GLOBE}${esc(langTag)}</span>` : ''}
        ${statusHtml}
      </div>
      <div class="meta">
        <div class="teams">${esc(m.title)}</div>
        <div class="event">${esc(m.tournament)}</div>
        <div class="card-time">${esc(timeLabel)}</div>
        <div class="actions">${actionsHtml}</div>
      </div>
    </article>
  `;
}

function attachHandlers(){
  grid.addEventListener('click', (e) => {
    const watchBtn = e.target.closest('.btn-watch-now');
    if(watchBtn && watchBtn.dataset.url){
      window.location.href = watchBtn.dataset.url;
      return;
    }
    const row = e.target.closest('.ww-row');
    if(row && row.dataset.url){
      window.location.href = row.dataset.url;
      return;
    }
    const wwBtn = e.target.closest('.btn-ww');
    if(wwBtn){
      const matchId = wwBtn.closest('.card').dataset.matchId;
      const panel = document.getElementById(wwBtn.dataset.target);
      if(panel){
        const willOpen = !panel.classList.contains('open');
        panel.classList.toggle('open', willOpen);
        wwBtn.classList.toggle('open', willOpen);
        if(willOpen){ openPanels.add(matchId); } else { openPanels.delete(matchId); }
      }
      return;
    }
    const upcomingBtn = e.target.closest('.btn-upcoming');
    if(upcomingBtn){
      alert('This match is scheduled to start at:\n' + upcomingBtn.dataset.upcomingTime);
    }
  });

  grid.addEventListener('keydown', (e) => {
    if(e.key !== 'Enter' && e.key !== ' ') return;
    const row = e.target.closest('.ww-row');
    if(row && row.dataset.url){
      e.preventDefault();
      window.location.href = row.dataset.url;
    }
  });

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    if(!q){ renderGrid(allMatches); return; }
    const filtered = allMatches.filter(m =>
      m.title.toLowerCase().includes(q) || m.tournament.toLowerCase().includes(q)
    );
    renderGrid(filtered);
  });
}

function renderGrid(matches){
  if(!matches.length){
    grid.innerHTML = `<div class="empty-state">No matches found.</div>`;
    return;
  }
  grid.innerHTML = matches.map(renderCard).join('');
}

function buildMatches(cnptvData, worldData){
  const cnptvMap = {};
  (cnptvData.matches || []).forEach(m => { cnptvMap[m.match_id] = m; });

  const matches = (worldData.matches || []).map(m => {
    const status = String(m.status || '').toUpperCase();
    const isLive = status === 'LIVE';
    const cnptv = cnptvMap[m.match_id];
    const cnptvUrl = cnptv && cnptv.cnptv_cdn ? cnptv.cnptv_cdn : null;
    const streams = m.streams || {};

    return {
      id: m.match_id,
      title: m.title || 'Match',
      tournament: m.tournament || '',
      image: m.image || FALLBACK_IMG,
      status: status === 'LIVE' || status === 'COMPLETED' ? status : 'UPCOMING',
      language: m.language,
      isLive,
      time: parseMatchTime(m.startTime),
      langCode: langToCode(m.language, isLive),
      cnptvUrl,
      lk: streams.fancode_lk_cdn || null,
      np: streams.fancode_np_cdn || null,
      bd: streams.fancode_bd_cdn || null
    };
  });

  matches.sort((a, b) => {
    if(a.isLive !== b.isLive) return a.isLive ? -1 : 1;
    const at = a.time ? a.time.getTime() : Infinity;
    const bt = b.time ? b.time.getTime() : Infinity;
    return at - bt;
  });

  return matches;
}

async function refresh(isFirstLoad){
  try{
    const [cnptvData, worldData] = await Promise.all([
      fetch(CNPTV_SOURCE, { cache:'no-store' }).then(r => r.json()).catch(() => ({ matches: [] })),
      fetch(WORLD_SOURCE, { cache:'no-store' }).then(r => r.json())
    ]);

    lastUpdatedAt = parseUpdatedAt(worldData.updatedAt) || new Date();

    const snapshot = JSON.stringify(worldData.matches || []);
    if(!isFirstLoad && snapshot === lastWorldSnapshot){
      lastUpdateEl.textContent = 'LAST UPDATE: ' + formatAbsoluteIST(lastUpdatedAt);
      return;
    }
    lastWorldSnapshot = snapshot;

    allMatches = buildMatches(cnptvData, worldData);
    const q = searchInput.value.trim().toLowerCase();
    if(q){
      renderGrid(allMatches.filter(m => m.title.toLowerCase().includes(q) || m.tournament.toLowerCase().includes(q)));
    } else {
      renderGrid(allMatches);
    }
    lastUpdateEl.textContent = 'LAST UPDATE: ' + formatAbsoluteIST(lastUpdatedAt);
  } catch(err){
    console.error('FanCode board failed to load:', err);
    if(isFirstLoad){
      grid.innerHTML = `<div class="empty-state">Couldn't load the match board. Try refreshing.</div>`;
      lastUpdateEl.textContent = 'LAST UPDATE: UNAVAILABLE';
    }
  }
}

function loadVisitorCounter(){
  fetch(HIT_COUNTER_URL, { cache:'no-store' })
    .then(r => r.json())
    .then(data => {
      document.getElementById('vcTotal').textContent = data.total_formatted != null ? data.total_formatted : '—';
      document.getElementById('vcUnique').textContent = data.unique_formatted != null ? data.unique_formatted : '—';
    })
    .catch(() => {
      const box = document.getElementById('visitorCounter');
      if(box){ box.style.display = 'none'; }
    });
}

attachHandlers();
refresh(true);
loadVisitorCounter();
setInterval(() => refresh(false), REFRESH_INTERVAL_MS);

document.getElementById('joinTelegramBtn').addEventListener('click', () => {
  window.open(TELEGRAM_LINK, '_blank');
});

const telegramModal = document.getElementById('telegramModal');
window.addEventListener('load', () => {
  if(!sessionStorage.getItem('fc_telegram_joined')){
    telegramModal.classList.remove('hidden');
  }
});
document.getElementById('joinButton').addEventListener('click', () => {
  sessionStorage.setItem('fc_telegram_joined', 'yes');
  telegramModal.classList.add('hidden');
});
document.getElementById('closeButton').addEventListener('click', () => {
  sessionStorage.setItem('fc_telegram_joined', 'yes');
  telegramModal.classList.add('hidden');
});
</script>
